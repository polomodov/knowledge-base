name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - run: pip install uv
      - name: Documentation gates (ADR and Markdown links)
        run: npm run check
      - name: Offline visualization template syntax and safety
        run: node scripts/check-viz-template.mjs
      - name: Wheel carries the offline visualization template
        run: |
          uv build --wheel
          unzip -l dist/*.whl | grep 'knowledge_base/templates/viz_template.html'
      - name: Ruff lint
        run: uv run --extra dev ruff check src tests
      - name: Ruff format check
        run: uv run --extra dev ruff format --check src tests
      - name: Mypy
        run: uv run --extra dev mypy

  test:
    runs-on: ubuntu-latest
    env:
      KB_ARANGO_URL: http://127.0.0.1:8529
      KB_ARANGO_USER: root
      KB_ARANGO_PASSWORD: knowledge-base-dev
      KB_RUN_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install uv
      - name: Base package imports without MCP extra
        run: uv run --isolated --extra dev python -c 'import importlib.util; import knowledge_base.mcp_server; assert importlib.util.find_spec("mcp") is None'
      - name: Start ArangoDB with vector index
        # Parity with compose/arangodb.compose.yml — GHA service containers cannot set `command`.
        run: |
          docker run -d --name knowledge-base-arangodb \
            -e ARANGO_ROOT_PASSWORD=knowledge-base-dev \
            -p 8529:8529 \
            arangodb:3.12 arangod --vector-index
      - name: Wait for ArangoDB
        run: |
          for _ in $(seq 1 60); do
            if curl -sf -u root:knowledge-base-dev http://127.0.0.1:8529/_api/version >/dev/null; then
              echo "ArangoDB is ready"
              exit 0
            fi
            sleep 2
          done
          echo "ArangoDB did not become ready in time" >&2
          exit 1
      - name: Tests with coverage (unit + integration)
        run: uv run --extra dev --extra mcp pytest --cov=knowledge_base --cov-report=term-missing --cov-fail-under=70
