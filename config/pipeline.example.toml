# Optional TOML config passed via `kb --config <path>`. Only the keys below are read.
# Retrieval limits are CLI flags (e.g. `kb search text <q> --limit 20`), not config.
[arangodb]
url = "http://127.0.0.1:8529"
database = "knowledge_base"
user = "root"
password_env = "KB_ARANGO_PASSWORD"

[embedding]
# provider: "hash" (default) is the built-in deterministic, offline, zero-dependency model.
# "local" uses a real sentence-transformers model; install it yourself with
# `uv pip install sentence-transformers` (kept out of the locked deps on purpose).
provider = "hash"
dimension = 8
# For provider = "local", set the model and a dimension that matches it, e.g.:
# provider = "local"
# model = "sentence-transformers/all-MiniLM-L6-v2"
# dimension = 384
