# Optional TOML config passed via `kb --config <path>`. Only the keys below are read.
# Retrieval limits are CLI flags (e.g. `kb search text <q> --limit 20`), not config.
[arangodb]
url = "http://127.0.0.1:8529"
database = "knowledge_base"
user = "root"
password_env = "KB_ARANGO_PASSWORD"

# Default [embedding]: deterministic hash / dim 8 for offline smoke and CI (zero deps, no model download).
# For production semantic quality, switch to the commented local profile below (or env KB_EMBEDDING_*).
[embedding]
# provider: "hash" (default) is the built-in deterministic, offline, zero-dependency model.
# "local" uses a real sentence-transformers model; install it yourself with
# `uv pip install sentence-transformers` (kept out of the locked deps on purpose).
provider = "hash"
dimension = 8
# Production / real-corpus profile (uncomment and comment out hash defaults above):
# provider = "local"
# model = "sentence-transformers/all-mpnet-base-v2"
# dimension = 768
# After changing provider/model/dimension, re-embed the existing corpus (no re-ingest needed):
#   kb index rebuild --target embeddings   # recompute vectors + rebuild index; clears stale similarity edges
#   kb index rebuild --target related      # rebuild item_related_to_item on the new embeddings
#   kb index rebuild --target communities  # cluster the similarity graph into communities (GR-4)

[retrieval]
# min_similarity: relevance floor for semantic hits (cosine). 0.0 (default) only drops
# anti-correlated hits; raise it (e.g. 0.35) with a real embedding model to keep the pool
# precise. Also overridable per query with `kb search semantic|hybrid --min-similarity`.
min_similarity = 0.0

[community]
# resolution: granularity of GR-4 Louvain community detection (`kb index rebuild --target
# communities`). 1.0 (default) is standard Louvain; higher values (e.g. 2.0, 4.0) yield more,
# smaller communities. On a dense similarity graph raise it if the largest community is too broad.
resolution = 1.0
